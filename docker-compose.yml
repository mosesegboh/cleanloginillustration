services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: HFM
      APP_ENV: local
      APP_KEY: base64:LwdlgVJJHy6fFO+7klw6z0EAFltg72sX1MFntnX8dO4=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      FEATURE_SIGNUP_ENABLED: "true"
      FEATURE_LOGIN_ENABLED: "true"
      SIGNUP_CHALLENGE_MINIMUM_SECONDS: "2"
      SIGNUP_CHALLENGE_LIFETIME_SECONDS: "7200"
    volumes:
      - sqlite-data:/var/www/html/storage/database

volumes:
  sqlite-data:
